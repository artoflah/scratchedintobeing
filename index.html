<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCRATCHED INTO BEING</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-col">
            <div class="header-item">[SCR]</div>
            <div class="header-item">[ATCHED]</div>
            <div class="header-item">[IN] [TO]</div>
            <div class="header-item">[BEING]</div>
        </div>
        <div class="header-col">
            <div class="time">11:47 PM EST</div>
            <div class="location">New York City, NY</div>
            <div class="contact">contact@scratchedintobeing.com</div>
            <div class="header-item">↓↓↓</div>
            <div class="header-item">↓</div>
            
        </div>

        <div class="header-col">
            <div class="header-item1">Marks Made: 24 / 7</div>
            <div class="header-item1">Last Updated: OCT 2025</div>
        </div>
    </header>
    </div>
</main>

<!-- Vertical Logo -->
<div class="vertical-logo">
    <img src="images/LOGO.png" alt="Scratched Into Being">
</div>


    <main id="gallery">
        <!-- Connection lines -->
        <svg id="connection-lines"></svg>
        <!-- Images will be dynamically generated by JavaScript -->
        <canvas id="full-page-canvas"></canvas>
    </main>
<!-- Instructions Panel -->
<div class="instructions-panel">
    <p>TAG THE SURFACE.</p>
    <p>LEAVE YOUR MARK BEHIND.</p>
    <p>HOVER — LET IT BLEED COLOR.</p>
  </div>
  

    <div class="tools-panel">
        <div class="tool-item active" data-tool="scratch">SCRATCH</div>
        <div class="tool-item" data-tool="tag">TAG</div>
        <div class="divider">|</div>
        <div class="color-option active" data-color="#ff69b4" style="background: #ffffff; "></div>
        <div class="color-option" data-color="#000000" style="background: #000000;"></div>
        <div class="color-option" data-color="#ff0000" style="background: #ff0000;"></div>
        <div class="color-option" data-color="#ffff00" style="background: #ffff00;"></div>
        <div class="divider">|</div>
        <div class="clear-all">CLEAR</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
